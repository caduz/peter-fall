<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Peter Fall</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<meta name="screen-orientation" content="landscape" />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; touch-action: none; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: #0c1410;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }
  #app {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .stage {
    position: relative;
    background: #000;
    border: 3px solid #2a3a30;
    border-radius: 6px;
    box-shadow: 0 20px 60px rgba(0,0,0,.7);
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    flex-shrink: 0;
  }
  canvas#game {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  canvas#ui {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
  }
  .help {
    position: fixed;
    bottom: 10px; left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    letter-spacing: .14em;
    color: #4a6454;
    text-transform: uppercase;
    pointer-events: none;
    text-align: center;
    white-space: nowrap;
    font-family: ui-monospace, Menlo, Consolas, monospace;
    touch-action: auto;
  }
  .help kbd {
    display: inline-block;
    padding: 1px 5px;
    margin: 0 2px;
    border: 1px solid #2a3a30;
    border-bottom-width: 2px;
    border-radius: 3px;
    color: #8aaa7a;
    background: #12181a;
    font-family: inherit;
    font-size: 9px;
  }

  /* ── touch controls ── */
  #touch-controls {
    display: none;
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 10;
  }
  .tbtn {
    position: absolute;
    pointer-events: all;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    /* retro pixel-art button style */
    opacity: 0.7;
    background: #1a2a1a;
    border-top:    3px solid #4a6a3a;
    border-left:   3px solid #4a6a3a;
    border-right:  3px solid #0a1208;
    border-bottom: 3px solid #0a1208;
    color: #c8b048;
    font-family: "Press Start 2P", monospace;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    image-rendering: pixelated;
    transition: filter 0.04s;
  }
  .tbtn.pressed {
    border-top:    3px solid #0a1208;
    border-left:   3px solid #0a1208;
    border-right:  3px solid #4a6a3a;
    border-bottom: 3px solid #4a6a3a;
    filter: brightness(1.4);
  }

  /* ── portrait warning ── */
  #portrait-overlay {
    display: none;
    position: fixed; inset: 0;
    background: #0c1410;
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    color: #f5e6a8;
    font-family: "Press Start 2P", monospace;
    font-size: 11px;
    text-align: center;
    line-height: 2;
  }
  #portrait-overlay .rotate-icon {
    font-size: 48px;
    animation: spin90 1.2s ease-in-out infinite alternate;
  }
  @keyframes spin90 {
    from { transform: rotate(0deg); }
    to   { transform: rotate(90deg); }
  }
  @media (pointer: coarse) and (orientation: portrait) {
    #portrait-overlay { display: flex; }
  }
  @media (pointer: coarse) {
    #touch-controls { display: block; }
    .help { display: none; }
    .stage { border: none; border-radius: 0; box-shadow: none; }
  }
</style>
</head>
<body>

<div id="app">
  <div id="stage" class="stage">
    <canvas id="game" width="320" height="192"></canvas>
    <canvas id="ui"></canvas>
  </div>
</div>

<div id="portrait-overlay">
  <div class="rotate-icon">&#x1F4F1;</div>
  <div>ROTATE TO PLAY</div>
</div>

<div id="touch-controls">
  <div class="tbtn" id="tbtn-left">&#9664;</div>
  <div class="tbtn" id="tbtn-right">&#9654;</div>
  <div class="tbtn" id="tbtn-jump">B</div>
  <div class="tbtn" id="tbtn-start">&#9654;</div>
</div>

<div class="help">
  <kbd>←</kbd><kbd>→</kbd> Run &nbsp;
  <kbd>Space</kbd> Jump &nbsp;
  <kbd>↑</kbd><kbd>↓</kbd> Vine/Climb &nbsp;
  <kbd>Enter</kbd> Start/Pause &nbsp;
  <kbd>M</kbd> Mute
</div>

<script>
(function(){
'use strict';

// ── canvas ───────────────────────────────────────────────────────────────────
const W = 320, H = 192;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const uiCanvas = document.getElementById('ui');
let ux = uiCanvas.getContext('2d');
let S = 1;

function fitStage() {
  const touch = window.matchMedia('(pointer: coarse)').matches;
  let aw, ah;
  if (touch) {
    // Use full viewport — buttons are overlaid on top
    aw = window.innerWidth;
    ah = window.innerHeight;
    S = Math.min(aw / W, ah / H);
  } else {
    const pad = 60;
    aw = window.innerWidth  - pad;
    ah = window.innerHeight - pad;
    S = Math.max(1, Math.min(Math.floor(aw / W), Math.floor(ah / H)));
  }
  const dw = Math.round(W * S), dh = Math.round(H * S);
  canvas.style.width  = dw + 'px';
  canvas.style.height = dh + 'px';
  uiCanvas.width  = dw;
  uiCanvas.height = dh;
  uiCanvas.style.width  = dw + 'px';
  uiCanvas.style.height = dh + 'px';
  ux = uiCanvas.getContext('2d');

  if (touch) layoutTouchButtons(dw, dh);
}
window.addEventListener('resize', fitStage);

// Position touch buttons relative to the rendered canvas size
function layoutTouchButtons(dw, dh) {
  const btn = sz => Math.round(Math.min(dw, dh) * sz);
  const bs = btn(0.13);   // button size
  const mg = btn(0.04);   // margin from edge
  const pad = Math.round(bs * 0.18);

  const left  = document.getElementById('tbtn-left');
  const right = document.getElementById('tbtn-right');
  const jump  = document.getElementById('tbtn-jump');
  const start = document.getElementById('tbtn-start');

  // canvas is centered in the viewport
  const cx = Math.round((window.innerWidth  - dw) / 2);
  const cy = Math.round((window.innerHeight - dh) / 2);

  const bottom = cy + dh - mg - bs;

  function place(el, x, y, w, h, fs) {
    el.style.left   = x + 'px';
    el.style.top    = y + 'px';
    el.style.width  = w + 'px';
    el.style.height = h + 'px';
    el.style.fontSize = fs + 'px';
  }

  place(left,  cx + mg,          bottom, bs, bs, Math.round(bs * 0.45));
  place(right, cx + mg + bs + pad, bottom, bs, bs, Math.round(bs * 0.45));
  place(jump,  cx + dw - mg - bs, bottom, bs, bs, Math.round(bs * 0.38));
  place(start, cx + Math.round(dw/2) - Math.round(bs*0.4),
               bottom + Math.round((bs - bs*0.8)/2),
               Math.round(bs*0.8), Math.round(bs*0.8), Math.round(bs * 0.28));
}

fitStage();

// Request landscape lock on touch devices (silently ignored if unsupported)
if ('ontouchstart' in window && screen.orientation && screen.orientation.lock) {
  screen.orientation.lock('landscape').catch(() => {});
}

// Wait for Press Start 2P before first frame
let fontReady = false;
document.fonts.load('16px "Press Start 2P"').then(() => { fontReady = true; });

// ── palette ──────────────────────────────────────────────────────────────────
const PAL = {
  sky:          '#5c8a3a',
  canopy_a:     '#487a2a',
  canopy_b:     '#2f5a18',
  trunk:        '#6b3f1d',
  trunk_sh:     '#4a2a10',
  ground_a:     '#c8b048',
  ground_b:     '#7a6818',
  ground_c:     '#a89030',
  pit:          '#000000',
  vine:         '#2f5a18',
  water:        '#3a6fa8',
  water_sh:     '#1a3a68',
  tar:          '#0a0a0a',
  brick_a:      '#b8483a',
  brick_b:      '#6a1a14',
  brick_mt:     '#1a0a08',
  hero_skin:    '#f0c098',
  hero_shirt:   '#e8503a',
  hero_shirt_d: '#a02a18',
  hero_pants:   '#3a8a48',
  hero_pants_d: '#1f5a28',
  hero_hair:    '#1a0a08',
  ui_text:      '#f5e6a8',
  ui_dim:       '#8da895',
  tr_gold:      '#f5b83a',
  tr_silver:    '#cfd2d6',
  tr_red:       '#d83a2a',
  cobra_a:      '#1f4720',
  cobra_b:      '#0a1f0a',
  scorp:        '#6b1f10',
  scorp_d:      '#3a0a06',
  croc:         '#3a8a3a',
  croc_d:       '#1f5a20',
  croc_eye:     '#f5e6a8',
  log_a:        '#6b3f1d',
  log_b:        '#4a2a14',
};

const FONT    = '"Press Start 2P", monospace';
const SURFACE_Y  = 144;
const FEET_Y     = 144;
const GROUND_BOT = 168;
const RUN_SPEED  = 80;
const JUMP_V     = 220;
const GRAVITY    = 720;
const TERM_VEL   = 320;
const VINE_GRAB_R = 12;

// ── screens ──────────────────────────────────────────────────────────────────
const SCREENS = [
  { name:'Start',       treasures:[{x:180,kind:'coin'}] },
  { name:'Logs',        log:{speed:46} },
  { name:'Pit & Vine',  gap:{x:112,w:96},  vine:{x:160,len:80,period:2.4}, treasures:[{x:228,kind:'silver'}] },
  { name:'Quicksand',   gap:{x:96,w:128},  hazardKind:'quicksand', vine:{x:144,len:88,period:2.0} },
  { name:'Cobra',       cobra:{x:200},     treasures:[{x:64,kind:'coin'}] },
  { name:'Tar',         gap:{x:80,w:160},  hazardKind:'tar',
    vines:[{x:112,len:80,period:2.2,phase:0},{x:200,len:80,period:2.2,phase:1.1}],
    treasures:[{x:248,kind:'silver'}] },
  { name:'Scorpion',    scorpion:{xMin:48,xMax:240,speed:24} },
  { name:'Twin Logs',   logs:[{speed:54,phase:0},{speed:54,phase:0.5}] },
  { name:'Ruin',        wall:{x:160,h:18}, treasures:[{x:248,kind:'gold'}] },
  { name:'Pit Hop',     gap:{x:128,w:64} },
  { name:'Croc Lagoon', gap:{x:64,w:192},  hazardKind:'water',
    crocs:[{x:80},{x:128},{x:176},{x:224}], vine:{x:144,len:88,period:2.0} },
  { name:'Ring Vault',  cobra:{x:96},      treasures:[{x:240,kind:'ring'}] },
  { name:'Long Log',    log:{speed:38} },
  { name:'Triple Vine', gap:{x:64,w:208},  hazardKind:'tar',
    vines:[{x:96,len:88,period:2.0,phase:0},{x:160,len:88,period:2.0,phase:0.8},{x:224,len:88,period:2.0,phase:1.6}],
    treasures:[{x:280,kind:'gold'}] },
  { name:'Den',         scorpion:{xMin:32,xMax:272,speed:32}, treasures:[{x:144,kind:'coin'}] },
  { name:'Cache',       treasures:[{x:160,kind:'silver'}] },
];

// ── state ────────────────────────────────────────────────────────────────────
const STATE = {
  mode: 'TITLE',
  score: 0, timer: 20*60, lives: 3,
  screenIdx: 0, enteredFrom: 'left',
  hero: null, entities: [],
  treasuresTaken: new Set(),
  hi: parseInt(localStorage.getItem('peterfall_hi') || '0', 10),
  flash: 0, dieTimer: 0, invuln: 0, t: 0, mute: 0,
  speedMul: 1.4, gravityMul: 1.0,
};

function newHero(x) {
  return {
    x, y: FEET_Y, vx: 0, vy: 0, w: 8, h: 22,
    onGround: true, onLadder: false, onVine: null,
    facing: 1, anim: 0, coyote: 0, jumpBuf: 0,
    vineCooldown: 0, stepTimer: 0,
  };
}

// ── input ────────────────────────────────────────────────────────────────────
const keys = Object.create(null), justKeys = Object.create(null);
function pressKey(k){ if(!keys[k]) justKeys[k]=1; keys[k]=1; AudioBus.resume(); }
function releaseKey(k){ keys[k]=0; }
window.addEventListener('keydown', e => {
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' ','Enter','m','M','p','P'].includes(e.key))
    e.preventDefault();
  pressKey(e.key);
}, {passive: false});
window.addEventListener('keyup', e => { releaseKey(e.key); });
function consume(k){ const v = justKeys[k]; justKeys[k] = 0; return v; }

// ── touch controls ───────────────────────────────────────────────────────────
(function(){
  const btnMap = {
    'tbtn-left':  'ArrowLeft',
    'tbtn-right': 'ArrowRight',
    'tbtn-jump':  ' ',
    'tbtn-start': 'Enter',
  };

  Object.keys(btnMap).forEach(id => {
    const el = document.getElementById(id);
    const k  = btnMap[id];

    function onStart(e){ e.preventDefault(); el.classList.add('pressed');    pressKey(k); }
    function onEnd(e)  { e.preventDefault(); el.classList.remove('pressed'); releaseKey(k); }

    el.addEventListener('pointerdown',  onStart, {passive: false});
    el.addEventListener('pointerup',    onEnd,   {passive: false});
    el.addEventListener('pointercancel',onEnd,   {passive: false});
  });
})();

// ── audio ────────────────────────────────────────────────────────────────────
const AudioBus = (() => {
  let actx = null, master = null, musicTimer = null, step = 0;
  function resume() {
    if (!actx) {
      try {
        actx = new (window.AudioContext || window.webkitAudioContext)();
        master = actx.createGain(); master.gain.value = STATE.mute ? 0 : 0.22;
        master.connect(actx.destination);
      } catch(e){ return; }
    }
    if (actx.state === 'suspended') actx.resume();
  }
  function setMute(m){ if (master) master.gain.value = m ? 0 : 0.22; }
  function beep({freq=440,freq2=null,dur=0.08,type='square',vol=0.3,attack=0.005,release=0.05,when=0}){
    if (!actx) return;
    const t = actx.currentTime + when;
    const osc = actx.createOscillator(); osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    if (freq2 != null) osc.frequency.exponentialRampToValueAtTime(Math.max(1,freq2), t+dur);
    const g = actx.createGain();
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vol,t+attack); g.gain.linearRampToValueAtTime(0,t+dur+release);
    osc.connect(g); g.connect(master); osc.start(t); osc.stop(t+dur+release+0.02);
  }
  function noise({dur=0.2,vol=0.2,when=0,hp=200}){
    if (!actx) return;
    const t = actx.currentTime + when;
    const buf = actx.createBuffer(1, Math.floor(actx.sampleRate*dur), actx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
    const s = actx.createBufferSource(); s.buffer = buf;
    const f = actx.createBiquadFilter(); f.type='highpass'; f.frequency.value=hp;
    const g = actx.createGain(); g.gain.value=vol;
    s.connect(f); f.connect(g); g.connect(master); s.start(t);
  }
  const bassNotes=[110,110,146,110,165,165,146,110];
  const leadNotes=[440,0,587,0,659,0,587,494,440,494,587,659,587,494,440,0];
  function startMusic(){
    if (!actx||musicTimer) return; step=0;
    const beat=60/110/2;
    musicTimer=setInterval(()=>{
      const b=bassNotes[step%bassNotes.length]; if(b) beep({freq:b,dur:beat*0.6,type:'triangle',vol:0.15,attack:0.005,release:0.04});
      const l=leadNotes[step%leadNotes.length]; if(l) beep({freq:l,dur:beat*0.5,type:'square',vol:0.07,attack:0.005,release:0.03});
      step++;
    }, beat*1000);
  }
  function stopMusic(){ if(musicTimer){clearInterval(musicTimer);musicTimer=null;} }
  return {
    resume, setMute, startMusic, stopMusic,
    jump()   { beep({freq:440,freq2:660,dur:0.08,type:'square',vol:0.16}); },
    pickup() { beep({freq:660,dur:0.06,type:'square',vol:0.16}); beep({freq:990,dur:0.06,type:'square',vol:0.16,when:0.07}); },
    big()    { beep({freq:660,dur:0.06,type:'square',vol:0.18}); beep({freq:880,dur:0.06,type:'square',vol:0.18,when:0.07}); beep({freq:1320,dur:0.10,type:'square',vol:0.18,when:0.14}); },
    die()    { noise({dur:0.4,vol:0.20}); beep({freq:220,freq2:55,dur:0.5,type:'square',vol:0.22}); },
    swing()  { beep({freq:160,dur:0.18,type:'triangle',vol:0.16}); },
    step()   { noise({dur:0.04,vol:0.06,hp:1200}); },
  };
})();

// Unlock AudioContext on first touch (required by mobile browsers)
document.addEventListener('touchstart', () => AudioBus.resume(), {once: true, passive: true});

// ── screen setup ─────────────────────────────────────────────────────────────
function enterScreen(idx, fromLeft) {
  STATE.screenIdx   = ((idx % SCREENS.length) + SCREENS.length) % SCREENS.length;
  STATE.enteredFrom = fromLeft ? 'left' : 'right';
  buildEntities();
  if (STATE.hero) {
    STATE.hero.x = fromLeft ? 8 : W - 8 - STATE.hero.w;
    STATE.hero.y = FEET_Y; STATE.hero.vx = 0; STATE.hero.vy = 0;
    STATE.hero.onGround = true; STATE.hero.onVine = null;
    STATE.hero.onLadder = false; STATE.hero.vineCooldown = 0;
  }
}

function buildEntities(){
  const s = SCREENS[STATE.screenIdx], ents = [];
  if (s.gap) {
    ents.push({k:'ground',x1:0,x2:s.gap.x});
    ents.push({k:'ground',x1:s.gap.x+s.gap.w,x2:W});
    const hk = s.hazardKind || 'pit';
    ents.push({k:hk,x:s.gap.x,w:s.gap.w});
    if (hk !== 'quicksand') ents.push({k:'gap',x:s.gap.x,w:s.gap.w});
  } else {
    ents.push({k:'ground',x1:0,x2:W});
  }
  const enterLeft = STATE.enteredFrom === 'left';
  const logList = s.logs || (s.log ? [s.log] : []);
  logList.forEach(L => {
    const base = enterLeft ? W*0.55 : W*0.05;
    const offset = (L.phase != null ? L.phase : 0) * W * 0.4;
    let x = base + offset;
    const lw = 18;
    while (x > W)   x -= (W+lw);
    while (x < -lw) x += (W+lw);
    ents.push({k:'log',x,y:FEET_Y-3,w:lw,h:6,speed:L.speed||40});
  });
  const vineList = s.vines || (s.vine ? [s.vine] : []);
  vineList.forEach(v => ents.push({k:'vine',anchorX:v.x,anchorY:32,len:v.len||80,period:v.period||2.2,phase:v.phase||0}));
  if (s.cobra)    ents.push({k:'cobra',x:s.cobra.x,y:FEET_Y-12,w:8,h:12,t:0});
  if (s.scorpion) ents.push({k:'scorpion',x:s.scorpion.xMin,y:FEET_Y-6,w:14,h:6,dir:1,xMin:s.scorpion.xMin,xMax:s.scorpion.xMax,speed:s.scorpion.speed,t:0});
  if (s.crocs)    s.crocs.forEach((c,i) => ents.push({k:'croc',x:c.x,y:FEET_Y-2,w:14,h:6,t:i*0.4}));
  if (s.wall)     ents.push({k:'wall',x:s.wall.x,y:FEET_Y-s.wall.h,w:12,h:s.wall.h});
  (s.treasures||[]).forEach((t,i) => {
    const id = STATE.screenIdx+':'+i;
    if (!STATE.treasuresTaken.has(id))
      ents.push({k:'treasure',id,x:t.x,y:FEET_Y-10,w:8,h:8,kind:t.kind});
  });
  STATE.entities = ents;
}

// ── helpers ──────────────────────────────────────────────────────────────────
function isSupported(cx){ for(const e of STATE.entities) if(e.k==='ground'&&cx>=e.x1&&cx<=e.x2) return true; return false; }
function heroBox(){ const h=STATE.hero; return {x:h.x,y:h.y-h.h,w:h.w,h:h.h}; }
function rectOverlap(a,b){ return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y; }
function standingOnCroc(h){
  for(const e of STATE.entities){
    if(e.k!=='croc') continue;
    const open=(e.t%3)>1.4&&(e.t%3)<2.0;
    if(!open&&h.y>=e.y-1&&h.y<=e.y+2&&h.x+h.w>e.x&&h.x<e.x+e.w) return true;
  }
  return false;
}
function treasureValue(k){ return ({coin:100,silver:500,gold:1000,ring:5000})[k]||100; }

// ── game logic ───────────────────────────────────────────────────────────────
function startGame(){
  STATE.score=2000; STATE.timer=20*60; STATE.lives=3;
  STATE.screenIdx=0; STATE.enteredFrom='left';
  STATE.treasuresTaken.clear();
  STATE.hero=newHero(40); STATE.mode='PLAYING';
  STATE.invuln=0.6; STATE.flash=0;
  buildEntities(); AudioBus.resume(); AudioBus.startMusic();
}
function die(){
  if(STATE.invuln>0) return;
  STATE.lives--; STATE.mode='DYING'; STATE.dieTimer=1.2; STATE.flash=0.4; AudioBus.die();
}
function respawn(){
  STATE.hero=newHero(STATE.enteredFrom==='left'?8:W-8-10);
  buildEntities();
  const spawnLeft=STATE.enteredFrom==='left';
  for(const e of STATE.entities) if(e.k==='log') e.x=spawnLeft?W*0.55:-e.w+W*0.05;
  STATE.invuln=1.2;
}

// ── update ───────────────────────────────────────────────────────────────────
function update(dt){
  STATE.t += dt;
  if(STATE.mode==='TITLE')  { if(consume('Enter')) startGame(); return; }
  if(STATE.mode==='GAMEOVER'){ if(consume('Enter')) STATE.mode='TITLE'; return; }
  if(STATE.mode==='PAUSED') { if(consume('Enter')||consume('p')||consume('P')) STATE.mode='PLAYING'; return; }
  if(STATE.mode==='DYING')  {
    STATE.dieTimer-=dt;
    if(STATE.dieTimer<=0){
      if(STATE.lives<=0){STATE.mode='GAMEOVER';AudioBus.stopMusic();}
      else{STATE.mode='PLAYING';respawn();}
    }
    return;
  }
  if(consume('Enter')||consume('p')||consume('P')){STATE.mode='PAUSED';return;}
  if(consume('m')||consume('M')){STATE.mute^=1;AudioBus.setMute(STATE.mute);}
  if(STATE.invuln>0) STATE.invuln-=dt;
  STATE.timer-=dt;
  if(STATE.timer<=0){STATE.timer=0;STATE.mode='GAMEOVER';AudioBus.stopMusic();return;}

  const h=STATE.hero;
  const left=keys['ArrowLeft']?1:0, right=keys['ArrowRight']?1:0;
  const up=keys['ArrowUp']?1:0, down=keys['ArrowDown']?1:0;
  const jumpPress=consume(' ')||consume('ArrowUp');
  if(jumpPress) h.jumpBuf=0.1;
  h.jumpBuf=Math.max(0,h.jumpBuf-dt);
  if(h.onGround) h.coyote=0.08; else h.coyote=Math.max(0,h.coyote-dt);

  if(h.onVine&&!STATE.entities.includes(h.onVine)) h.onVine=null;
  if(h.onVine){
    const v=h.onVine;
    const angle=Math.sin(STATE.t*Math.PI*2/v.period+v.phase)*0.9;
    const tipX=v.anchorX+Math.sin(angle)*v.len, tipY=v.anchorY+Math.cos(angle)*v.len;
    h.x=tipX-h.w/2; h.y=tipY+18; h.vx=0; h.vy=0;
    if(h.jumpBuf>0||up){
      const dAng=Math.cos(STATE.t*Math.PI*2/v.period+v.phase)*(Math.PI*2/v.period)*0.9;
      h.vx=Math.cos(angle)*v.len*dAng; h.vy=-180;
      h.onVine=null; h.vineCooldown=0.4; h.jumpBuf=0; AudioBus.swing();
    } else if(down){
      h.onVine=null; h.vx=0; h.vy=0; h.vineCooldown=0.4;
    }
  }

  if(!h.onVine){
    const speed=RUN_SPEED*STATE.speedMul;
    if(left&&!right){h.vx=-speed;h.facing=-1;} else if(right&&!left){h.vx=speed;h.facing=1;} else h.vx=0;
    if(h.jumpBuf>0&&h.coyote>0&&!h.onLadder){
      h.vy=-JUMP_V; h.onGround=false; h.coyote=0; h.jumpBuf=0; AudioBus.jump();
    }
    h.vy+=GRAVITY*STATE.gravityMul*dt; if(h.vy>TERM_VEL) h.vy=TERM_VEL;
    h.x+=h.vx*dt; h.y+=h.vy*dt;
    if(h.vineCooldown>0) h.vineCooldown-=dt;
    if(!h.onGround&&h.vineCooldown<=0){
      for(const e of STATE.entities){
        if(e.k!=='vine') continue;
        const angle=Math.sin(STATE.t*Math.PI*2/e.period+e.phase)*0.9;
        const tipX=e.anchorX+Math.sin(angle)*e.len, tipY=e.anchorY+Math.cos(angle)*e.len;
        const dx=(h.x+h.w/2)-tipX, dy=(h.y-4)-(tipY+18);
        if(Math.hypot(dx,dy)<VINE_GRAB_R){h.onVine=e;h.vx=0;h.vy=0;AudioBus.swing();break;}
      }
    }
    h.onGround=false;
    if(h.vy>=0&&isSupported(h.x+h.w/2)&&h.y>=FEET_Y){h.y=FEET_Y;h.vy=0;h.onGround=true;}
    for(const e of STATE.entities){
      if(e.k!=='wall') continue;
      if(h.x+h.w>e.x&&h.x<e.x+e.w&&h.y>e.y){
        if(h.vx>0) h.x=e.x-h.w; else if(h.vx<0) h.x=e.x+e.w;
        else if(h.vy>0){h.y=e.y;h.vy=0;h.onGround=true;}
      }
    }
  }

  if(h.onGround&&Math.abs(h.vx)>1){
    h.anim+=dt*8; h.stepTimer-=dt;
    if(h.stepTimer<=0){AudioBus.step();h.stepTimer=0.18;}
  } else { h.anim=0; h.stepTimer=0; }

  if(h.x+h.w/2<0){enterScreen(STATE.screenIdx-1,false);return;}
  if(h.x+h.w/2>W){enterScreen(STATE.screenIdx+1,true);return;}

  for(const e of STATE.entities){
    if(e.k==='log'){e.x+=e.speed*dt;if(e.x>W)e.x=-e.w;}
    if(e.k==='scorpion'){
      e.x+=e.speed*e.dir*dt;
      if(e.x<e.xMin){e.x=e.xMin;e.dir=1;} if(e.x>e.xMax-e.w){e.x=e.xMax-e.w;e.dir=-1;}
      e.t+=dt;
    }
    if(e.k==='cobra'||e.k==='croc') e.t+=dt;
    const hb=heroBox();
    if((e.k==='log'||e.k==='scorpion')&&rectOverlap(hb,e)) return die();
    if(e.k==='cobra'){
      const lethalY=e.y+4+Math.sin(e.t*4)*2;
      if(rectOverlap(hb,{x:e.x,y:lethalY,w:e.w,h:8})) return die();
    }
    if(e.k==='croc'){
      const open=(e.t%3)>1.4&&(e.t%3)<2.0;
      if(open){if(rectOverlap(hb,{x:e.x,y:e.y-4,w:e.w,h:14})) return die();}
      else if(h.vy>=0&&h.y>=e.y&&h.y-h.vy*dt<=e.y&&h.x+h.w>e.x&&h.x<e.x+e.w){h.y=e.y;h.vy=0;h.onGround=true;}
    }
    if((e.k==='tar'||e.k==='water')&&!h.onVine&&!standingOnCroc(h)&&h.y>=FEET_Y+2&&h.x+h.w>e.x&&h.x<e.x+e.w) return die();
    if(e.k==='quicksand'){
      const open=(Math.sin(STATE.t*1.4)+1)/2>0.4;
      if(open&&!h.onVine&&h.y>=FEET_Y+2&&h.x+h.w>e.x&&h.x<e.x+e.w) return die();
    }
    if(e.k==='pit'&&!h.onVine&&h.y>=FEET_Y+24&&h.x+h.w>e.x&&h.x<e.x+e.w){
      STATE.score=Math.max(0,STATE.score-100); STATE.flash=0.2;
      h.y=FEET_Y;h.vy=0;h.onGround=true;
      h.x=(h.x+h.w/2<e.x+e.w/2)?e.x-h.w-1:e.x+e.w+1; AudioBus.die();
    }
    if(e.k==='treasure'&&rectOverlap(hb,e)){
      const v=treasureValue(e.kind); STATE.score+=v;
      STATE.treasuresTaken.add(e.id); e.taken=true;
      if(v>=1000) AudioBus.big(); else AudioBus.pickup();
    }
  }
  STATE.entities=STATE.entities.filter(e=>!e.taken);
  if(STATE.flash>0) STATE.flash-=dt;
}

// ── draw ─────────────────────────────────────────────────────────────────────
function px(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x|0,y|0,w|0,h|0);}

function drawBackground(){
  px(0,0,W,H,PAL.sky);
  px(0,GROUND_BOT,W,H-GROUND_BOT,PAL.pit);
  const lobeW=W/5;
  for(let i=0;i<5;i++){
    const cx=i*lobeW+lobeW/2;
    for(let y=8;y<54;y+=2){const r=30-(y-8)*0.28;px(cx-r,y,r*2,2,PAL.canopy_a);}
    for(let y=50;y<60;y+=2){const r=32-(y-50)*0.8;px(cx-r,y,r*2,2,PAL.canopy_b);}
  }
  px(0,58,W,22,PAL.canopy_b);
  const lobeW2=W/5;
  for(let i=0;i<=5;i++){const tx=(i*lobeW2)|0;px(tx-2,58,6,SURFACE_Y-58,PAL.trunk);px(tx+2,58,2,SURFACE_Y-58,PAL.trunk_sh);}
}

function drawGround(){
  for(const e of STATE.entities){
    if(e.k!=='ground') continue;
    const w=e.x2-e.x1;
    px(e.x1,SURFACE_Y,w,8,PAL.ground_a); px(e.x1,SURFACE_Y+8,w,4,PAL.ground_b); px(e.x1,SURFACE_Y+12,w,12,PAL.ground_c);
  }
  for(const e of STATE.entities){
    if(e.k==='pit'||e.k==='gap') px(e.x,SURFACE_Y,e.w,H-SURFACE_Y,PAL.pit);
    if(e.k==='tar'){px(e.x,SURFACE_Y,e.w,H-SURFACE_Y,PAL.pit);for(let x=e.x+2;x<e.x+e.w-2;x+=5)px(x,SURFACE_Y+2,3,1,'#1a1a1a');}
    if(e.k==='water'){
      px(e.x,SURFACE_Y,e.w,H-SURFACE_Y,PAL.pit); px(e.x,SURFACE_Y+2,e.w,14,PAL.water_sh);
      for(let x=e.x;x<e.x+e.w;x+=6){const wy=SURFACE_Y+4+(Math.sin(x*0.3+STATE.t*4)*1.5|0);px(x,wy,4,1,PAL.water);}
    }
    if(e.k==='quicksand'){
      const open=(Math.sin(STATE.t*1.4)+1)/2>0.4;
      px(e.x,SURFACE_Y,e.w,H-SURFACE_Y,PAL.pit);
      if(!open){px(e.x,SURFACE_Y,e.w,4,'#7a6a20');px(e.x,SURFACE_Y+4,e.w,2,'#5a4a16');}
    }
  }
}

function drawVines(){
  for(const e of STATE.entities){
    if(e.k!=='vine') continue;
    const angle=Math.sin(STATE.t*Math.PI*2/e.period+e.phase)*0.9;
    for(let i=1;i<=14;i++){
      const f=i/14;
      px(e.anchorX+Math.sin(angle)*e.len*f,e.anchorY+Math.cos(angle)*e.len*f,2,2,PAL.vine);
    }
    const tipX=e.anchorX+Math.sin(angle)*e.len, tipY=e.anchorY+Math.cos(angle)*e.len;
    px(tipX-2,tipY-1,4,4,PAL.canopy_a);
  }
}

function drawHero(){
  const h=STATE.hero; if(!h) return;
  const x=h.x|0, yTop=(h.y-h.h)|0, f=h.facing;
  px(x+1,yTop,6,2,PAL.hero_hair); px(x+1,yTop+2,6,4,PAL.hero_skin);
  px(x+(f>0?5:2),yTop+3,1,1,'#000');
  px(x+1,yTop+6,6,5,PAL.hero_shirt); px(x+1,yTop+10,6,1,PAL.hero_shirt_d); px(x+1,yTop+11,6,1,PAL.hero_hair);
  let lp=0;
  if(h.onVine) lp=3; else if(!h.onGround) lp=2; else if(Math.abs(h.vx)>1) lp=(h.anim|0)%2;
  if(lp===2){px(x+1,yTop+12,3,6,PAL.hero_pants);px(x+4,yTop+12,3,6,PAL.hero_pants);px(x+1,yTop+18,3,3,PAL.hero_pants_d);px(x+4,yTop+18,3,3,PAL.hero_pants_d);}
  else if(lp===3){px(x+2,yTop+12,4,8,PAL.hero_pants);px(x+2,yTop+20,4,2,PAL.hero_pants_d);}
  else if(lp===0){px(x+1,yTop+12,3,9,PAL.hero_pants);px(x+4,yTop+12,3,7,PAL.hero_pants);px(x+4,yTop+19,4,3,PAL.hero_pants_d);}
  else{px(x+1,yTop+12,3,7,PAL.hero_pants);px(x+4,yTop+12,3,9,PAL.hero_pants);px(x,yTop+19,4,3,PAL.hero_pants_d);}
  if(h.onVine){px(x+2,yTop+5,4,2,PAL.hero_skin);px(x+3,yTop+1,2,5,PAL.hero_skin);}
  else if(!h.onGround){px(x+(f>0?7:0),yTop+7,1,4,PAL.hero_skin);}
  else if(Math.abs(h.vx)>1){const sw=lp===0?0:1;px(x+(f>0?7:0),yTop+7+sw,1,4,PAL.hero_skin);px(x+(f>0?0:7),yTop+7+1-sw,1,3,PAL.hero_skin);}
  else{px(x,yTop+7,1,4,PAL.hero_skin);px(x+7,yTop+7,1,4,PAL.hero_skin);}
}

function drawEntities(){
  for(const e of STATE.entities){
    if(e.k==='log'){
      const positions=[e.x|0];
      if(e.x<0) positions.push((e.x+W)|0); if(e.x+e.w>W) positions.push((e.x-W)|0);
      for(const lx of positions){
        px(lx,e.y,e.w,e.h,PAL.log_a); px(lx,e.y+1,e.w,1,PAL.log_b); px(lx,e.y+e.h-2,e.w,1,PAL.log_b);
        const ph=((STATE.t*2+e.x*0.05)%1)*e.w; px(lx+(ph|0),e.y+2,2,2,PAL.log_b);
      }
    }
    if(e.k==='cobra'){
      const bob=(Math.sin(e.t*4)*2)|0;
      px(e.x,e.y+10,e.w,2,PAL.cobra_a); px(e.x,e.y+12,e.w,2,PAL.cobra_b);
      px(e.x+1,e.y+4+bob,6,8-bob,PAL.cobra_a); px(e.x-1,e.y+2+bob,10,3,PAL.cobra_a);
      px(e.x+5,e.y+3+bob,1,1,'#f5e6a8');
    }
    if(e.k==='scorpion'){
      const wig=(Math.sin(e.t*8)*1)|0;
      px(e.x,e.y,e.w,4,PAL.scorp); px(e.x,e.y+2,e.w,2,PAL.scorp_d);
      px(e.x+(e.dir>0?-3:e.w-1),e.y+1+wig,4,2,PAL.scorp);
      px(e.x+(e.dir>0?e.w-2:-2),e.y-2,3,3,PAL.scorp); px(e.x+(e.dir>0?e.w:-3),e.y-4,2,2,PAL.scorp_d);
    }
    if(e.k==='croc'){
      const open=(e.t%3)>1.4&&(e.t%3)<2.0;
      px(e.x,e.y,e.w,3,PAL.croc); px(e.x,e.y+3,e.w,1,PAL.croc_d);
      px(e.x,e.y-3,6,4,PAL.croc); px(e.x,e.y-4,4,1,PAL.croc); px(e.x+4,e.y-3,1,1,PAL.croc_eye);
      if(open){px(e.x-1,e.y-1,8,1,PAL.pit);for(let i=0;i<4;i++)px(e.x+i*2,e.y-2,1,1,'#f5e6a8');}
      else px(e.x,e.y,6,1,PAL.croc_d);
    }
    if(e.k==='wall'){
      for(let r=0;r<e.h;r+=4){
        const ro=((r/4)%2===0)?0:2;
        for(let c=0;c<e.w;c+=4){px(e.x+c+ro,e.y+r,4,3,(r+c)%8===0?PAL.brick_b:PAL.brick_a);px(e.x+c+ro,e.y+r+3,4,1,PAL.brick_mt);}
      }
    }
    if(e.k==='treasure'){
      const x=e.x,y=e.y;
      if(e.kind==='coin'){px(x+2,y+1,4,1,PAL.tr_gold);px(x+1,y+2,6,4,PAL.tr_gold);px(x+2,y+6,4,1,PAL.tr_gold);px(x+3,y+3,2,2,'#a8801a');}
      if(e.kind==='silver'){px(x+1,y+2,6,3,PAL.tr_silver);px(x+1,y+5,6,1,'#8a8e90');}
      if(e.kind==='gold'){px(x+1,y+2,6,3,PAL.tr_gold);px(x+1,y+5,6,1,'#a8801a');}
      if(e.kind==='ring'){px(x+2,y+1,4,1,PAL.tr_gold);px(x+1,y+2,1,4,PAL.tr_gold);px(x+6,y+2,1,4,PAL.tr_gold);px(x+2,y+6,4,1,PAL.tr_gold);px(x+3,y,2,2,PAL.tr_red);}
    }
  }
}

// ── HUD ───────────────────────────────────────────────────────────────────────
function drawHeroIcon(x,y){
  px(x+1,y,4,1,PAL.hero_hair); px(x+1,y+1,4,2,PAL.hero_skin);
  px(x+1,y+3,4,3,PAL.hero_shirt); px(x+1,y+6,2,2,PAL.hero_pants); px(x+3,y+6,2,2,PAL.hero_pants);
}

function txt(str, x, y, color, size, align, baseline){
  ux.fillStyle   = color;
  ux.font        = Math.round(size * S * 0.75) + 'px ' + FONT;
  ux.textAlign   = align    || 'left';
  ux.textBaseline= baseline || 'top';
  ux.fillText(str, x * S, y * S);
}

function drawHUD(){
  ux.clearRect(0, 0, uiCanvas.width, uiCanvas.height);
  txt(String(STATE.score).padStart(6,'0'), 4, 4, PAL.ui_text, 8);
  const m=Math.floor(STATE.timer/60), s=Math.floor(STATE.timer%60);
  txt('|| '+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0'), 4, 16, PAL.ui_text, 8);
  txt(SCREENS[STATE.screenIdx].name.toUpperCase(), W/2, 3, PAL.ui_dim, 6, 'center');
  txt((STATE.screenIdx+1)+'/'+SCREENS.length,      W/2, 13, PAL.ui_dim, 6, 'center');
  for(let i=0;i<STATE.lives;i++) drawHeroIcon(W-14-i*12, 4);
}

// ── overlays ─────────────────────────────────────────────────────────────────
function drawTitle(){
  drawBackground();
  ctx.fillStyle='rgba(0,0,0,0.60)'; ctx.fillRect(20,44,W-40,110);
  const hx=W/2-5, hy=94;
  px(hx+1,hy,6,2,PAL.hero_hair); px(hx+1,hy+2,6,4,PAL.hero_skin);
  px(hx+1,hy+6,6,5,PAL.hero_shirt); px(hx+2,hy+12,3,6,PAL.hero_pants); px(hx+5,hy+12,3,6,PAL.hero_pants);
  ux.clearRect(0, 0, uiCanvas.width, uiCanvas.height);
  txt('PETER FALL',              W/2,  52, PAL.ui_text, 16, 'center');
  txt('JUNGLE RUINS EXPEDITION', W/2,  76, PAL.ui_dim,   7, 'center');
  if((STATE.t*2|0)%2===0)
    txt('PRESS ENTER TO START',  W/2, 118, PAL.ui_text,  7, 'center');
  txt('HI '+String(STATE.hi).padStart(6,'0'), W/2, 136, PAL.ui_dim, 7, 'center');
}

function drawPaused(){
  ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,0,W,H);
  ux.clearRect(0, 0, uiCanvas.width, uiCanvas.height);
  txt('PAUSED',          W/2, H/2-18, PAL.ui_text, 16, 'center', 'top');
  txt('ENTER TO RESUME', W/2, H/2+6,  PAL.ui_dim,   7, 'center', 'top');
}

function drawGameOver(){
  if(STATE.score>STATE.hi){STATE.hi=STATE.score;localStorage.setItem('peterfall_hi',String(STATE.hi));}
  ctx.fillStyle='rgba(0,0,0,0.72)'; ctx.fillRect(0,0,W,H);
  ux.clearRect(0, 0, uiCanvas.width, uiCanvas.height);
  txt('GAME OVER',                                  W/2, H/2-36, PAL.ui_text, 16, 'center', 'top');
  txt('SCORE '+String(STATE.score).padStart(6,'0'), W/2, H/2-8,  PAL.ui_text,  8, 'center', 'top');
  txt('HI    '+String(STATE.hi).padStart(6,'0'),    W/2, H/2+8,  PAL.ui_dim,   8, 'center', 'top');
  if((STATE.t*2|0)%2===0)
    txt('PRESS ENTER TO CONTINUE', W/2, H/2+24, PAL.ui_dim, 6, 'center', 'top');
}

// ── loop ──────────────────────────────────────────────────────────────────────
let lastT=performance.now(), acc=0;
const STEP=1/60;

function frame(now){
  const raw=(now-lastT)/1000; lastT=now; acc+=Math.min(raw,0.1);
  while(acc>=STEP){
    update(STEP); acc-=STEP;
    if(STATE.mode==='TITLE'||STATE.mode==='GAMEOVER'||STATE.mode==='PAUSED') break;
  }

  drawBackground(); drawGround(); drawVines(); drawEntities();
  if(STATE.mode!=='TITLE'&&STATE.hero){
    if(STATE.invuln>0&&(STATE.t*14|0)%2===0){/*blink*/} else drawHero();
  }
  drawHUD();

  if(STATE.flash>0){ctx.fillStyle='rgba(245,230,168,'+Math.min(1,STATE.flash*2.5)+')';ctx.fillRect(0,0,W,H);}
  if(STATE.mode==='DYING'){ctx.fillStyle='rgba(216,58,42,'+(0.35+0.35*Math.sin(STATE.t*28))+')';ctx.fillRect(0,0,W,H);}

  if(STATE.mode==='TITLE')         drawTitle();
  else if(STATE.mode==='PAUSED')   drawPaused();
  else if(STATE.mode==='GAMEOVER') drawGameOver();

  const startBtn = document.getElementById('tbtn-start');
  if (startBtn) startBtn.innerHTML = (STATE.mode==='PLAYING'||STATE.mode==='DYING') ? '&#9646;&#9646;' : '&#9654;';

  requestAnimationFrame(frame);
}

function waitForFont(){
  if(fontReady||STATE.t>1) requestAnimationFrame(frame);
  else setTimeout(waitForFont,50);
}
setTimeout(waitForFont,100);

})();
